$engine: 3
$onesync: on
name: Nexus Aftermath
description: Recipe for the Nexus Aftermath apocalypse framework. Downloads everything and creates server.cfg. Only manual step is importing sql/schema.sql into MySQL.

tasks:
  # Download Nexus Aftermath framework
  - action: download_github
    src: https://github.com/Chariig/nexus_aftermath
    ref: master
    dest: ./resources/[nexus]/nexus_apocalypse

  # Download oxmysql release zip
  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    path: ./tmp/oxmysql.zip
  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/[core]

  # Download ox_lib release zip
  - action: download_file
    url: https://github.com/overextended/ox_lib/releases/latest/download/ox_lib.zip
    path: ./tmp/ox_lib.zip
  - action: unzip
    src: ./tmp/ox_lib.zip
    dest: ./resources/[core]

  # Download ox_inventory release zip
  - action: download_file
    url: https://github.com/overextended/ox_inventory/releases/latest/download/ox_inventory.zip
    path: ./tmp/ox_inventory.zip
  - action: unzip
    src: ./tmp/ox_inventory.zip
    dest: ./resources/[core]

  # Download ox_target release zip
  - action: download_file
    url: https://github.com/overextended/ox_target/releases/latest/download/ox_target.zip
    path: ./tmp/ox_target.zip
  - action: unzip
    src: ./tmp/ox_target.zip
    dest: ./resources/[core]

  # Remove default CFX resources
  - action: remove_path
    path: ./resources/[gameplay]
  - action: remove_path
    path: ./resources/[standalone]
  - action: remove_path
    path: ./resources/[voice]
  - action: remove_path
    path: ./resources/mapmanager
  - action: remove_path
    path: ./resources/spawnmanager
  - action: remove_path
    path: ./resources/sessionmanager
  - action: remove_path
    path: ./resources/basic-gamemode
  - action: remove_path
    path: ./resources/hardcap
  - action: remove_path
    path: ./resources/rconlog
  - action: remove_path
    path: ./resources/webpack
  - action: remove_path
    path: ./resources/chat
  - action: remove_path
    path: ./resources/connectqueue

  # Clean up temp files
  - action: remove_path
    path: ./tmp

  # Download server.cfg template to server root
  - action: download_file
    url: https://raw.githubusercontent.com/Chariig/nexus_aftermath/master/server.cfg
    path: ./server.cfg
