$engine: 3
$onesync: on
name: Nexus Aftermath
description: Recipe for the Nexus Aftermath apocalypse framework. Downloads everything and creates server.cfg. Only manual step is importing sql/schema.sql into MySQL.

tasks:
  # Download Nexus Aftermath framework
  - action: download_github
    src: https://github.com/Chariig/nexus_aftermath
    ref: master
    dest: ./resources/[nexus]/nexus_apocalypse

  # Download core dependencies
  - action: download_github
    src: https://github.com/overextended/oxmysql
    ref: main
    dest: ./resources/[core]/oxmysql

  - action: download_github
    src: https://github.com/overextended/ox_lib
    ref: main
    dest: ./resources/[core]/ox_lib

  - action: download_github
    src: https://github.com/overextended/ox_inventory
    ref: main
    dest: ./resources/[core]/ox_inventory

  - action: download_github
    src: https://github.com/overextended/ox_target
    ref: main
    dest: ./resources/[core]/ox_target

  # Remove default CFX resources
  - action: remove_path
    path: ./resources/[gameplay]

  - action: remove_path
    path: ./resources/[standalone]

  - action: remove_path
    path: ./resources/[voice]

  - action: remove_path
    path: ./resources/mapmanager

  - action: remove_path
    path: ./resources/spawnmanager

  - action: remove_path
    path: ./resources/sessionmanager

  - action: remove_path
    path: ./resources/basic-gamemode

  - action: remove_path
    path: ./resources/hardcap

  - action: remove_path
    path: ./resources/rconlog

  - action: remove_path
    path: ./resources/webpack

  - action: remove_path
    path: ./resources/chat

  - action: remove_path
    path: ./resources/connectqueue

  # Download server.cfg template to server root
  - action: download_file
    url: https://raw.githubusercontent.com/Chariig/nexus_aftermath/master/server.cfg
    path: ./server.cfg
