<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="inventory-container" class="hidden">
        <div id="inventory-header">
            <span id="inventory-title">INVENTORY</span>
            <span id="weight-display">0 / 100 kg</span>
            <button id="close-btn">X</button>
        </div>
        <div id="inventory-tabs">
            <button class="tab active" data-tab="all">ALL</button>
            <button class="tab" data-tab="weapons">WEAPONS</button>
            <button class="tab" data-tab="medical">MEDICAL</button>
            <button class="tab" data-tab="food">FOOD</button>
            <button class="tab" data-tab="materials">MATERIALS</button>
            <button class="tab" data-tab="tools">TOOLS</button>
            <button class="tab" data-tab="rare">RARE</button>
        </div>
        <div id="inventory-grid"></div>
    </div>

    <div id="crafting-container" class="hidden">
        <div id="crafting-header">
            <span id="crafting-title">CRAFTING</span>
            <button id="crafting-close-btn">X</button>
        </div>
        <div id="crafting-grid"></div>
    </div>

    <div id="radio-container" class="hidden">
        <div id="radio-header">
            <span id="radio-title">RADIO</span>
            <button id="radio-close-btn">X</button>
        </div>
        <div id="radio-content">
            <div id="radio-controls">
                <input type="range" id="radio-freq-slider" min="1" max="999" value="420">
                <div id="radio-freq-display">420.0 MHz</div>
                <input type="text" id="radio-freq-input" placeholder="Enter frequency..." maxlength="7">
                <button id="radio-set-btn">SET</button>
            </div>
            <div id="radio-transmit">
                <textarea id="radio-message" placeholder="Enter message..." maxlength="200"></textarea>
                <button id="radio-send-btn">TRANSMIT</button>
                <label id="radio-encrypt-label">
                    <input type="checkbox" id="radio-encrypt"> Encrypt
                </label>
            </div>
            <div id="radio-log"></div>
        </div>
    </div>

    <div id="item-tooltip" class="hidden">
        <div id="tooltip-name"></div>
        <div id="tooltip-desc"></div>
        <div id="tooltip-stats"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
