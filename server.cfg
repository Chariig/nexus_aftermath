# Nexus: Aftermath - Server Configuration
# =========================================

# Endpoints
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# Server identity
sv_hostname "Nexus: Aftermath"
sv_master1 ""
sv_tags "NA,nexus,aftermath,apocalypse,zombie,survival,rp,pve,pvp,custom"
sets sv_projectName "Nexus: Aftermath"
sets sv_projectDesc "An apocalypse like no other. The world remembers everything."

# Server connection
sv_maxclients 64
sv_endpoint PrivacyToken "set_your_token_here"
sv_endpoints "0.0.0.0:30120"
sv_useDirectListing true

# Networking
sv_forceIndirectListing true
sv_authMaxVariance 5
sv_enhancedHostSupport true
sv_tempEntityLifetime 45

# Performance
onesync_enabled true
onesync_population true
onesync_distanceCulling 200
sv_schedulerMax 100

# Game settings
sv_scriptHookAllowed false
sv_enforceGameBuild 2802
sv_mumble http+ivs://mumble.fivem.net/audio/20e1e6c8-8c70-4b8b-9d0c-7d3b9e0a5f1c

# Resources
exec resources.cfg

# Server logging
sv_logsEnabled true
sv_logFileName "server.log"
sv_announcer true

# Nexus: Aftermath Config
set na_debug "false"
set na_max_players "64"
set na_world_tier "auto"
set na_infection_rate "1.0"
set na_resource_mult "1.0"

# Database (oxmysql required)
set mysql_connection_string "mysql://root@localhost/nexus_aftermath"

# Loading screen
loadscreen "https://cfx-nui-NA-loadscreen/"
loadscreen_manual_shutdown "no"

# Admins (add your SteamID or license here)
# add_principal identifier.steam:110000100000000 group.admin
# add_principal identifier.license:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx group.admin
