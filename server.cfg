# Nexus: Aftermath - Server Configuration
# =========================================

# Endpoints
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# Server identity
sv_hostname "Nexus: Aftermath"
sets sv_projectName "Nexus: Aftermath"
sets sv_projectDesc "An apocalypse like no other. The world remembers everything."

# Server license
sv_licenseKey "CHANGE_ME"
sv_maxclients 64

# Networking
sv_enhancedHostSupport true
setr sv_stateBagStrictMode true

# Game settings
sv_scriptHookAllowed false
sv_enforceGameBuild 2802

# Resources
ensure oxmysql
ensure ox_lib
ensure ox_inventory
ensure ox_target
ensure nexus_apocalypse

# Nexus: Aftermath Config
set na_debug "false"
set na_max_players "64"
set na_world_tier "auto"
set na_infection_rate "1.0"
set na_resource_mult "1.0"

# Database (oxmysql required)
set mysql_connection_string "mysql://root@localhost/nexus_aftermath"

# Admins (add your SteamID or license here)
# add_principal identifier.steam:110000100000000 group.admin
# add_principal identifier.license:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx group.admin
